<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    font-family: -apple-system, 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Icon mark — larger, fills more space */
  .icon-wrap {
    width: 260px;
    height: 260px;
    background: linear-gradient(145deg, #3b82f6 0%, #2563EB 45%, #1d4ed8 100%);
    border-radius: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 22px;
    box-shadow:
      0 24px 70px rgba(37,99,235,0.38),
      0 4px 16px rgba(37,99,235,0.20);
    position: relative;
    overflow: hidden;
  }

  /* Inner highlight shimmer */
  .icon-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 48%;
    background: linear-gradient(180deg, rgba(255,255,255,0.13) 0%, transparent 100%);
    border-radius: 64px 64px 0 0;
  }

  .icon-wrap svg {
    width: 148px;
    height: 148px;
    position: relative;
    z-index: 1;
  }

  /* Wordmark */
  .wordmark {
    font-size: 68px;
    font-weight: 900;
    color: #111827;
    letter-spacing: -2.5px;
    line-height: 1;
    margin-bottom: 7px;
  }

  .wordmark span {
    color: #2563EB;
  }

  /* Domain */
  .domain {
    font-size: 17px;
    font-weight: 500;
    color: #9CA3AF;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- House body -->
        <path d="M18 66L74 20L130 66V126C130 127.7 128.7 129 127 129H90V96H58V129H21C19.3 129 18 127.7 18 126V66Z"
              fill="white" fill-opacity="0.92"/>
        <!-- Door -->
        <rect x="60" y="98" width="28" height="31" rx="4" fill="#2563EB"/>
        <!-- Checkmark badge circle -->
        <circle cx="108" cy="46" r="24" fill="#10B981"/>
        <!-- Checkmark -->
        <polyline points="97,46 105,54 119,36"
                  stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <div class="wordmark">Go2Fix<span>.</span></div>
  </div>
</body>
</html>
