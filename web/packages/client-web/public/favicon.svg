<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#2563EB"/>

  <!-- House roof (triangle) -->
  <polygon points="16,5 27,15 5,15" fill="white"/>

  <!-- House body -->
  <rect x="8" y="15" width="16" height="12" rx="1" fill="white"/>

  <!-- Door cutout (blue so it looks like a hole) -->
  <rect x="13" y="19" width="6" height="8" rx="1" fill="#2563EB"/>

  <!-- Emerald dot accent (brand secondary color) -->
  <circle cx="24" cy="24" r="4" fill="#10B981"/>
  <!-- Checkmark inside dot -->
  <polyline points="22,24 23.5,25.5 26,22.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
