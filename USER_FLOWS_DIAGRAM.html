<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go2Fix.ro — Platform User Flows</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0F172A;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #main-svg {
      width: 5200px;
      height: 3700px;
      position: absolute;
      top: 0; left: 0;
      cursor: grab;
      display: block;
    }

    #main-svg.grabbing { cursor: grabbing; }

    #canvas-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Section Nav */
    #section-nav {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
    }

    .nav-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transition: all 0.15s ease;
      line-height: 1;
    }

    .nav-btn:hover {
      background: rgba(37,99,235,0.8);
      border-color: rgba(37,99,235,0.8);
      transform: translateX(2px);
    }

    .nav-btn .nav-letter {
      font-size: 14px;
      font-weight: 700;
    }

    .nav-btn .nav-label {
      font-size: 7px;
      font-weight: 500;
      opacity: 0.8;
      letter-spacing: 0.3px;
    }

    /* Controls */
    #controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }

    .ctrl-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .ctrl-btn:hover {
      background: rgba(37,99,235,0.8);
      border-color: rgba(37,99,235,0.8);
    }

    .ctrl-btn.small-text { font-size: 11px; font-weight: 700; }

    /* Zoom display */
    #zoom-display {
      position: fixed;
      bottom: 68px;
      right: 20px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      z-index: 100;
      font-family: 'Inter', sans-serif;
    }

    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 20px;
      left: 66px;
      width: 200px;
      height: 130px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      overflow: hidden;
      z-index: 100;
    }

    #minimap-svg {
      width: 200px;
      height: 130px;
      display: block;
    }

    #minimap-viewport {
      position: absolute;
      border: 1.5px solid #3B82F6;
      background: rgba(59,130,246,0.1);
      border-radius: 2px;
      pointer-events: none;
      top: 0; left: 0;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      pointer-events: none;
      z-index: 200;
      max-width: 240px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #tooltip .tt-route {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #93C5FD;
      margin-bottom: 4px;
    }

    #tooltip .tt-label {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 3px;
    }

    #tooltip .tt-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
    }

    /* Minimap label */
    #minimap-label {
      position: absolute;
      bottom: 4px;
      left: 6px;
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      font-family: 'Inter', sans-serif;
      pointer-events: none;
    }

    /* Node hover */
    .node { cursor: pointer; }
    .node:hover .node-bg { filter: brightness(1.1); }
  </style>
</head>
<body>
<div id="app">
  <div id="canvas-wrapper">
    <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5200 3700">
      <defs>
        <!-- Drop Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
        </filter>
        <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
        </filter>

        <!-- Arrow markers -->
        <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
        </marker>
        <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#2563EB"/>
        </marker>
        <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#10B981"/>
        </marker>
        <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
        </marker>
        <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
        </marker>
        <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
        </marker>
        <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
        </marker>
        <marker id="arrow-cross" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
        </marker>
      </defs>
      <g id="canvas"></g>
    </svg>
  </div>

  <!-- Section Nav -->
  <div id="section-nav">
    <button class="nav-btn" onclick="navTo('A')" title="System Gate">
      <span class="nav-letter">A</span>
      <span class="nav-label">SYSTEM</span>
    </button>
    <button class="nav-btn" onclick="navTo('B')" title="Guest Flow">
      <span class="nav-letter">B</span>
      <span class="nav-label">GUEST</span>
    </button>
    <button class="nav-btn" onclick="navTo('C')" title="Auth Checkpoint">
      <span class="nav-letter">C</span>
      <span class="nav-label">AUTH</span>
    </button>
    <button class="nav-btn" onclick="navTo('D')" title="Client Flow">
      <span class="nav-letter">D</span>
      <span class="nav-label">CLIENT</span>
    </button>
    <button class="nav-btn" onclick="navTo('E')" title="Company Flow">
      <span class="nav-letter">E</span>
      <span class="nav-label">COMPANY</span>
    </button>
    <button class="nav-btn" onclick="navTo('F')" title="Worker Flow">
      <span class="nav-letter">F</span>
      <span class="nav-label">WORKER</span>
    </button>
    <button class="nav-btn" onclick="navTo('G')" title="Admin Flow">
      <span class="nav-letter">G</span>
      <span class="nav-label">ADMIN</span>
    </button>
    <button class="nav-btn" onclick="navTo('H')" title="Subscription Flow">
      <span class="nav-letter">H</span>
      <span class="nav-label">SUBS</span>
    </button>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="ctrl-btn" onclick="zoomIn()" title="Zoom In">+</button>
    <button class="ctrl-btn" onclick="zoomOut()" title="Zoom Out">−</button>
    <button class="ctrl-btn small-text" onclick="fitScreen()" title="Fit to Screen">FIT</button>
    <button class="ctrl-btn small-text" onclick="resetZoom()" title="100%">1:1</button>
  </div>
  <div id="zoom-display">100%</div>

  <!-- Minimap -->
  <div id="minimap">
    <svg id="minimap-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5200 3700" preserveAspectRatio="xMidYMid meet">
      <g id="minimap-lanes"></g>
    </svg>
    <div id="minimap-viewport"></div>
    <span id="minimap-label">Minimap</span>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" style="display:none">
    <div class="tt-route" id="tt-route"></div>
    <div class="tt-label" id="tt-label"></div>
    <div class="tt-desc" id="tt-desc"></div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const SVG_W = 5200, SVG_H = 3700;
let tx = 0, ty = 0, scale = 1;
let dragging = false, lastX = 0, lastY = 0;

const svg = document.getElementById('main-svg');
const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');
const zoomDisplay = document.getElementById('zoom-display');

// ============================================================
// COLORS
// ============================================================
const COLORS = {
  system:  '#7C3AED',
  guest:   '#6B7280',
  auth:    '#374151',
  client:  '#2563EB',
  company: '#10B981',
  worker:  '#F59E0B',
  admin:   '#EF4444',
  sub:     '#7C3AED',
  dark:    '#374151'
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function colorTint(hex, alpha) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
// SVG HELPERS
// ============================================================
function el(tag, attrs={}, parent=null) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function elHTML(tag, attrs={}, parent=null) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'textContent') e.textContent = v;
    else e.setAttribute(k, v);
  }
  if (parent) parent.appendChild(e);
  return e;
}

function text(x, y, content, attrs={}, parent=null) {
  const t = el('text', {x, y, ...attrs}, parent);
  t.textContent = content;
  return t;
}

// ============================================================
// NODE BUILDERS
// ============================================================
function pageNode(id, x, y, route, label, desc, roleColor, w=160, h=66) {
  const g = el('g', {
    class: 'node',
    'data-id': id,
    'data-route': route || '',
    'data-label': label,
    'data-desc': desc || ''
  }, canvas);

  // Background rect
  const bg = el('rect', {
    class: 'node-bg',
    x: x - w/2, y: y - h/2,
    width: w, height: h,
    rx: 12,
    fill: colorTint(roleColor, 0.06),
    stroke: roleColor,
    'stroke-width': 2,
    filter: 'url(#shadow)'
  }, g);

  // White base
  el('rect', {
    x: x - w/2 + 1, y: y - h/2 + 1,
    width: w - 2, height: h - 2,
    rx: 11,
    fill: '#FFFFFF',
    opacity: 0.97
  }, g);

  // Color accent top bar
  el('rect', {
    x: x - w/2 + 1, y: y - h/2 + 1,
    width: w - 2, height: 4,
    rx: 4,
    fill: roleColor,
    opacity: 0.7
  }, g);

  // Route path
  if (route) {
    text(x, y - 10, route, {
      'text-anchor': 'middle',
      'font-family': "'Courier New', monospace",
      'font-size': '9.5',
      fill: '#6B7280',
      'dominant-baseline': 'middle'
    }, g);
  }

  // Label
  const labelLines = wrapText(label, 22);
  if (labelLines.length === 1) {
    text(x, route ? y + 8 : y + 2, labelLines[0], {
      'text-anchor': 'middle',
      'font-family': "'Inter', sans-serif",
      'font-size': '11.5',
      'font-weight': '600',
      fill: '#111827',
      'dominant-baseline': 'middle'
    }, g);
  } else {
    labelLines.forEach((line, i) => {
      text(x, (route ? y + 2 : y - 5) + i * 14, line, {
        'text-anchor': 'middle',
        'font-family': "'Inter', sans-serif",
        'font-size': '10.5',
        'font-weight': '600',
        fill: '#111827',
        'dominant-baseline': 'middle'
      }, g);
    });
  }

  // Desc
  if (desc) {
    text(x, y + h/2 - 10, desc, {
      'text-anchor': 'middle',
      'font-family': "'Inter', sans-serif",
      'font-size': '9',
      'font-style': 'italic',
      fill: '#9CA3AF',
      'dominant-baseline': 'middle'
    }, g);
  }

  addTooltip(g);
  return g;
}

function actionNode(id, x, y, label, roleColor, w=144, h=40) {
  const g = el('g', {
    class: 'node',
    'data-id': id,
    'data-route': '',
    'data-label': label,
    'data-desc': ''
  }, canvas);

  el('rect', {
    class: 'node-bg',
    x: x - w/2, y: y - h/2,
    width: w, height: h,
    rx: 8,
    fill: roleColor,
    filter: 'url(#shadow)'
  }, g);

  // Subtle highlight
  el('rect', {
    x: x - w/2 + 1, y: y - h/2 + 1,
    width: w - 2, height: h/2 - 2,
    rx: 7,
    fill: 'rgba(255,255,255,0.12)'
  }, g);

  const lines = wrapText(label, 20);
  if (lines.length === 1) {
    text(x, y, lines[0], {
      'text-anchor': 'middle',
      'font-family': "'Inter', sans-serif",
      'font-size': '11',
      'font-weight': '700',
      fill: '#FFFFFF',
      'dominant-baseline': 'middle'
    }, g);
  } else {
    lines.forEach((line, i) => {
      text(x, y + (i - (lines.length-1)/2) * 13, line, {
        'text-anchor': 'middle',
        'font-family': "'Inter', sans-serif",
        'font-size': '10',
        'font-weight': '700',
        fill: '#FFFFFF',
        'dominant-baseline': 'middle'
      }, g);
    });
  }

  addTooltip(g);
  return g;
}

function smallActionNode(id, x, y, label, roleColor, w=120, h=30) {
  return actionNode(id, x, y, label, roleColor, w, h);
}

function diamond(id, x, y, label, size=52) {
  const g = el('g', {
    class: 'node',
    'data-id': id,
    'data-route': '',
    'data-label': label,
    'data-desc': 'Decision point'
  }, canvas);

  const s = size / 2;
  el('rect', {
    class: 'node-bg',
    x: x - s, y: y - s,
    width: size, height: size,
    rx: 4,
    fill: '#FFFFFF',
    stroke: '#374151',
    'stroke-width': 2,
    transform: `rotate(45, ${x}, ${y})`,
    filter: 'url(#shadow)'
  }, g);

  text(x, y, label, {
    'text-anchor': 'middle',
    'font-family': "'Inter', sans-serif",
    'font-size': '9.5',
    'font-weight': '600',
    fill: '#111827',
    'dominant-baseline': 'middle'
  }, g);

  addTooltip(g);
  return g;
}

function wrapText(str, maxLen) {
  if (str.length <= maxLen) return [str];
  const words = str.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    if ((cur + ' ' + w).trim().length > maxLen) {
      if (cur) lines.push(cur.trim());
      cur = w;
    } else {
      cur = (cur + ' ' + w).trim();
    }
  }
  if (cur) lines.push(cur.trim());
  return lines;
}

function addTooltip(g) {
  g.addEventListener('mouseenter', (e) => {
    const route = g.getAttribute('data-route');
    const label = g.getAttribute('data-label');
    const desc = g.getAttribute('data-desc');
    document.getElementById('tt-route').textContent = route || '';
    document.getElementById('tt-route').style.display = route ? 'block' : 'none';
    document.getElementById('tt-label').textContent = label || '';
    document.getElementById('tt-desc').textContent = desc || '';
    document.getElementById('tt-desc').style.display = desc ? 'block' : 'none';
    tooltip.style.display = 'block';
    moveTooltip(e);
  });
  g.addEventListener('mousemove', moveTooltip);
  g.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
}

function moveTooltip(e) {
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 250 > window.innerWidth) x = e.clientX - 264;
  if (y + 100 > window.innerHeight) y = e.clientY - 110;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ============================================================
// ARROW BUILDERS
// ============================================================
function arrowColor(role) {
  const map = {
    gray:'#6B7280', blue:'#2563EB', green:'#10B981',
    amber:'#F59E0B', red:'#EF4444', purple:'#7C3AED', dark:'#374151'
  };
  return map[role] || '#6B7280';
}

function arrow(x1, y1, x2, y2, role='gray', label='', bend=false) {
  const color = arrowColor(role);
  const markerId = `arrow-${role}`;

  let d;
  if (bend) {
    const mx = (x1 + x2) / 2;
    d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  } else {
    d = `M${x1},${y1} L${x2},${y2}`;
  }

  const path = el('path', {
    d,
    stroke: color,
    'stroke-width': '1.6',
    fill: 'none',
    'marker-end': `url(#${markerId})`
  }, canvas);

  if (label) {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2 - 7;
    arrowLabel(mx, my, label);
  }
  return path;
}

function arrowElbow(x1, y1, x2, y2, midY, role='gray', label='') {
  const color = arrowColor(role);
  const markerId = `arrow-${role}`;
  const d = `M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2}`;
  el('path', {
    d,
    stroke: color,
    'stroke-width': '1.6',
    fill: 'none',
    'marker-end': `url(#${markerId})`
  }, canvas);

  if (label) arrowLabel((x1+x2)/2, midY - 8, label);
}

function crossLaneArrow(x1, y1, x2, y2, label='') {
  const cp1x = x1 + (x2 - x1) * 0.15;
  const cp2x = x1 + (x2 - x1) * 0.85;
  const d = `M${x1},${y1} C${cp1x},${y1} ${cp2x},${y2} ${x2},${y2}`;
  el('path', {
    d,
    stroke: '#9CA3AF',
    'stroke-width': '1.5',
    'stroke-dasharray': '8,4',
    fill: 'none',
    'marker-end': 'url(#arrow-cross)'
  }, canvas);

  if (label) {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    arrowLabel(mx, my - 8, label);
  }
}

function crossLaneArrowVert(x1, y1, x2, y2, label='') {
  const offset = Math.abs(x2 - x1) > 100 ? 120 : 60;
  const cp1y = y1 + (y2 - y1) * 0.3;
  const cp2y = y1 + (y2 - y1) * 0.7;
  const d = `M${x1},${y1} C${x1 + offset},${cp1y} ${x2 + offset},${cp2y} ${x2},${y2}`;
  el('path', {
    d,
    stroke: '#9CA3AF',
    'stroke-width': '1.5',
    'stroke-dasharray': '8,4',
    fill: 'none',
    'marker-end': 'url(#arrow-cross)'
  }, canvas);

  if (label) {
    const mx = x1 + (x2 - x1) * 0.5 + offset * 0.5;
    const my = (y1 + y2) / 2;
    arrowLabel(mx + 8, my, label);
  }
}

function arrowLabel(x, y, txt) {
  const g = el('g', {}, canvas);
  const pad = 4;
  const approxW = txt.length * 5.5 + pad * 2;
  el('rect', {
    x: x - approxW/2, y: y - 9,
    width: approxW, height: 16,
    rx: 4,
    fill: 'white',
    stroke: '#D1D5DB',
    'stroke-width': 1
  }, g);
  text(x, y + 1, txt, {
    'text-anchor': 'middle',
    'font-family': "'Inter', sans-serif",
    'font-size': '9',
    fill: '#4B5563',
    'dominant-baseline': 'middle'
  }, g);
}

// ============================================================
// LANE BACKGROUNDS
// ============================================================
function lane(y, h, roleColor, roleKey, sectionLetter, sectionName) {
  const g = el('g', {}, canvas);

  // Main bg
  el('rect', {
    x: 0, y,
    width: SVG_W, height: h,
    fill: colorTint(roleColor, 0.03)
  }, g);

  // Label strip
  el('rect', {
    x: 0, y,
    width: 68, height: h,
    fill: colorTint(roleColor, 0.18)
  }, g);

  // Divider line bottom
  el('line', {
    x1: 0, y1: y + h,
    x2: SVG_W, y2: y + h,
    stroke: '#E5E7EB',
    'stroke-width': 1
  }, g);

  // Section letter circle
  el('circle', {
    cx: 34, cy: y + 28,
    r: 16,
    fill: roleColor,
    opacity: 0.9
  }, g);
  text(34, y + 28, sectionLetter, {
    'text-anchor': 'middle',
    'font-family': "'Inter', sans-serif",
    'font-size': '13',
    'font-weight': '700',
    fill: '#FFFFFF',
    'dominant-baseline': 'middle'
  }, g);

  // Vertical label
  const labelEl = el('text', {
    x: 34,
    y: y + h/2 + 4,
    'text-anchor': 'middle',
    'font-family': "'Inter', sans-serif",
    'font-size': '10',
    'font-weight': '600',
    fill: roleColor,
    opacity: 0.85,
    'letter-spacing': '1.5',
    transform: `rotate(-90, 34, ${y + h/2})`
  }, g);
  labelEl.textContent = sectionName;

  return g;
}

function buildLanes() {
  const laneData = [
    [0,   90,  '#FFFFFF', 'header', '', ''],
    [90,  150, COLORS.system,  'system',  'A', 'SYSTEM GATE'],
    [240, 460, COLORS.guest,   'guest',   'B', 'GUEST FLOW'],

    [2240,520, COLORS.worker,  'worker',  'F', 'WORKER'],
    [2760,580, COLORS.admin,   'admin',   'G', 'ADMIN'],
    [3340,300, COLORS.sub,     'sub',     'H', 'SUBSCRIPTIONS']
  ];

  for (const [y, h, color, key, letter, name] of laneData) {
    if (letter) lane(y, h, color, key, letter, name);

      el('rect', { x:0, y:0, width: SVG_W, height: 90, fill: '#FFFFFF' }, canvas);
      el('line', { x1:0, y1:90, x2:SVG_W, y2:90, stroke:'#E5E7EB', 'stroke-width':1 }, canvas);

  }

// ============================================================
// MINIMAP
// ============================================================
function buildMinimap() {
  const minimapLanes = document.getElementById('minimap-lanes');
  const laneData = [
    [0,   90,  '#FFFFFF'],
    [90,  150, COLORS.system],
    [240, 460, COLORS.guest],
    [700, 180, COLORS.auth],
    [880, 600, COLORS.client],
    [1480,760, COLORS.company],
    [2240,520, COLORS.worker],
    [2760,580, COLORS.admin],
    [3340,300, COLORS.sub]
  ];

  for (const [y, h, color] of laneData) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', 0); r.setAttribute('y', y);
    r.setAttribute('width', 5200); r.setAttribute('height', h);
    r.setAttribute('fill', color === '#FFFFFF' ? '#FFFFFF' : hexToRgba(color, 0.25));
    minimapLanes.appendChild(r);

    // Divider
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', 0); l.setAttribute('y1', y + h);
    l.setAttribute('x2', 5200); l.setAttribute('y2', y + h);
    l.setAttribute('stroke', '#555'); l.setAttribute('stroke-width', 8);
    minimapLanes.appendChild(l);
  }
}

function hexToRgba(hex, alpha) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

function updateMinimap() {
  const mm = document.getElementById('minimap');
  const vp = document.getElementById('minimap-viewport');
  const mmW = 200, mmH = 130;
  const scaleX = mmW / SVG_W;
  const scaleY = mmH / SVG_H;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Visible area in SVG coords
  const visX = -tx / scale;
  const visY = -ty / scale;
  const visW = vw / scale;
  const visH = vh / scale;

  // Map to minimap coords
  let vpX = visX * scaleX;
  let vpY = visY * scaleY;
  let vpW = visW * scaleX;
  let vpH = visH * scaleY;

  // Clamp
  vpX = Math.max(0, Math.min(mmW - 4, vpX));
  vpY = Math.max(0, Math.min(mmH - 4, vpY));
  vpW = Math.min(vpW, mmW - vpX);
  vpH = Math.min(vpH, mmH - vpY);

  vp.style.left = vpX + 'px';
  vp.style.top = vpY + 'px';
  vp.style.width = Math.max(4, vpW) + 'px';
  vp.style.height = Math.max(4, vpH) + 'px';
}

// ============================================================
// TRANSFORM
// ============================================================
function applyTransform() {
  svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  svg.style.transformOrigin = '0 0';
  zoomDisplay.textContent = Math.round(scale * 100) + '%';
  updateMinimap();
}

function fitScreen() {
  const scaleX = window.innerWidth / SVG_W;
  const scaleY = window.innerHeight / SVG_H;
  scale = Math.min(scaleX, scaleY) * 0.95;
  tx = (window.innerWidth - SVG_W * scale) / 2;
  ty = (window.innerHeight - SVG_H * scale) / 2;
  applyTransform();
}

function resetZoom() {
  scale = 1;
  tx = 0; ty = 0;
  applyTransform();
}

function zoomIn() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  zoomAt(cx, cy, scale * 1.25);
}

function zoomOut() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  zoomAt(cx, cy, scale / 1.25);
}

function zoomAt(cx, cy, newScale) {
  newScale = Math.max(0.10, Math.min(3.0, newScale));
  const ratio = newScale / scale;
  tx = cx - ratio * (cx - tx);
  ty = cy - ratio * (cy - ty);
  scale = newScale;
  applyTransform();
}

// ============================================================
// SECTION NAV
// ============================================================
const SECTION_Y = { A:90, B:240, C:700, D:880, E:1480, F:2240, G:2760, H:3340 };

function navTo(section) {
  const targetY = SECTION_Y[section] || 0;
  // Animate pan to section
  const targetTy = -targetY * scale + 80;
  animatePan(tx, ty, tx, targetTy, 400);
}

function animatePan(x0, y0, x1, y1, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    tx = x0 + (x1 - x0) * ease;
    ty = y0 + (y1 - y0) * ease;
    applyTransform();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ============================================================
// PAN / ZOOM EVENTS
// ============================================================
const wrapper = document.getElementById('canvas-wrapper');

wrapper.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  svg.classList.add('grabbing');
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  tx += e.clientX - lastX;
  ty += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  applyTransform();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  svg.classList.remove('grabbing');
});

wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoomAt(e.clientX, e.clientY, scale * delta);
}, { passive: false });

// Touch support
let lastTouchDist = 0;
let touchStartX = 0, touchStartY = 0;
let touchStartTx = 0, touchStartTy = 0;
let pinching = false;

wrapper.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    pinching = true;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTx = tx;
    touchStartTy = ty;
  }
}, { passive: true });

wrapper.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinching) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    zoomAt(cx, cy, scale * (dist / lastTouchDist));
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && !pinching) {
    tx = touchStartTx + e.touches[0].clientX - touchStartX;
    ty = touchStartTy + e.touches[0].clientY - touchStartY;
    applyTransform();
  }
}, { passive: true });

wrapper.addEventListener('touchend', () => { pinching = false; }, { passive: true });

// Keyboard nav
window.addEventListener('keydown', (e) => {
  const step = 80;
  if (e.key === 'ArrowLeft')  { tx += step; applyTransform(); }
  if (e.key === 'ArrowRight') { tx -= step; applyTransform(); }
  if (e.key === 'ArrowUp')    { ty += step; applyTransform(); }
  if (e.key === 'ArrowDown')  { ty -= step; applyTransform(); }
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === 'f' || e.key === 'F') fitScreen();
  if (e.key === '0') resetZoom();
  const sections = ['a','b','c','d','e','f','g','h'];
  const idx = sections.indexOf(e.key.toLowerCase());
  if (idx >= 0) navTo(sections[idx].toUpperCase());
});

// ============================================================
// INIT
// ============================================================
buildDiagram();
buildMinimap();
fitScreen();
</script>
