type PlatformStats {
  totalClients: Int!
  totalCompanies: Int!
  totalWorkers: Int!
  totalBookings: Int!
  totalRevenue: Float!
  platformCommissionTotal: Float!
  averageRating: Float!
  bookingsThisMonth: Int!
  revenueThisMonth: Float!
  newClientsThisMonth: Int!
  newCompaniesThisMonth: Int!
  bookingsLastMonth: Int!
  revenueLastMonth: Float!
  newClientsLastMonth: Int!
  newCompaniesLastMonth: Int!
}

type BookingsByStatus {
  status: BookingStatus!
  count: Int!
}

type RevenueByMonth {
  month: String!
  revenue: Float!
  commission: Float!
  bookingCount: Int!
}

type CompanyPerformance {
  company: Company!
  totalBookings: Int!
  totalRevenue: Float!
  averageRating: Float!
  completionRate: Float!
}

type UploadResult {
  url: String!
  fileName: String!
}

type CompanyFinancialSummary {
  completedBookings: Int!
  totalRevenue: Float!
  totalCommission: Float!
  netPayout: Float!
}

type CompanyScorecard {
  id: ID!
  companyName: String!
  status: String!
  completedCount: Int!
  cancelledCount: Int!
  totalBookings: Int!
  totalRevenue: Float!
  completionRate: Float!
  cancellationRate: Float!
  avgRating: Float!
  reviewCount: Int!
}

extend type Query {
  platformStats(dateFrom: String, dateTo: String): PlatformStats!
  bookingsByStatus: [BookingsByStatus!]!
  revenueByMonth(months: Int): [RevenueByMonth!]!
  companyPerformance(first: Int): [CompanyPerformance!]!
  pendingCompanyApplications: [Company!]!
  allWorkers: [WorkerProfile!]!
  allChatRooms: [ChatRoom!]!
  allUsers: [User!]!
  searchCompanies(query: String, status: CompanyStatus, limit: Int, offset: Int): CompanyConnection!
  companyFinancialSummary(companyId: ID!): CompanyFinancialSummary!
  searchBookings(query: String, status: BookingStatus, dateFrom: String, dateTo: String, companyId: ID, serviceType: String, limit: Int, offset: Int): BookingConnection!
  allReviews(limit: Int, offset: Int, rating: Int, reviewType: String): ReviewConnection!
  companyScorecards(limit: Int, offset: Int): [CompanyScorecard!]!
}

extend type Mutation {
  adminCancelBooking(id: ID!, reason: String!): Booking!
  adminRescheduleBooking(id: ID!, scheduledDate: String!, scheduledStartTime: String!, reason: String): Booking!
  suspendUser(id: ID!, reason: String!): User!
  reactivateUser(id: ID!): User!
  uploadFile(file: Upload!, purpose: String!): UploadResult!
  adminUpdateCompanyProfile(input: AdminUpdateCompanyInput!): Company!
  adminUpdateCompanyStatus(id: ID!, status: CompanyStatus!): Company!
  deleteReview(id: ID!): Boolean!
  approveReview(id: ID!): Review!
  rejectReview(id: ID!): Review!
}

input AdminUpdateCompanyInput {
  id: ID!
  companyName: String!
  cui: String!
  address: String!
  contactPhone: String!
  contactEmail: String!
}
