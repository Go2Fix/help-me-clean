enum UserRole {
  CLIENT
  COMPANY_ADMIN
  WORKER
  GLOBAL_ADMIN
}

enum UserStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
  PENDING
}

type User {
  id: ID!
  email: String!
  fullName: String!
  phone: String
  phoneVerified: Boolean!
  avatarUrl: String
  role: UserRole!
  status: UserStatus!
  preferredLanguage: String!
  createdAt: DateTime!

  # Worker profile data (null if user role is not WORKER)
  workerProfile: WorkerProfile
}

extend type Query {
  me: User
}

extend type Mutation {
  updateProfile(input: UpdateProfileInput!): User!
  uploadAvatar(file: Upload!): User!
  deleteMyAccount: Boolean!

  # Sends a 6-digit OTP to the given phone via WhatsApp. Rate-limited to 3 per 10 minutes.
  # Returns false gracefully if WhatsApp is not configured (dev/staging env).
  requestPhoneVerification(phone: String!): Boolean!

  # Validates the OTP code. On success sets phone + phone_verified = true on the user.
  verifyPhone(phone: String!, code: String!): User!
}

input UpdateProfileInput {
  fullName: String
  phone: String
  avatarUrl: String
  preferredLanguage: String
}

type UserConnection {
  users: [User!]!
  totalCount: Int!
}

extend type Query {
  searchUsers(query: String, role: UserRole, status: UserStatus, limit: Int, offset: Int): UserConnection!
  user(id: ID!): User!
}

extend type Mutation {
  updateUserRole(userId: ID!, role: UserRole!): User!
  adminUpdateUserProfile(userId: ID!, fullName: String!, phone: String): User!
}
