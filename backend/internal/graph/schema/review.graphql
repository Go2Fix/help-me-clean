type Review {
  id: ID!
  booking: Booking
  reviewer: User
  worker: WorkerProfile
  rating: Int!
  comment: String
  reviewType: String!
  createdAt: DateTime!
}

type ReviewConnection {
  reviews: [Review!]!
  totalCount: Int!
}

extend type Query {
  companyWorkerReviews(limit: Int, offset: Int, rating: Int): ReviewConnection!
}

extend type Mutation {
  submitReview(input: SubmitReviewInput!): Review!
}

input SubmitReviewInput {
  bookingId: ID!
  rating: Int!
  comment: String
}
