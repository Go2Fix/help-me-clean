type Review {
  id: ID!
  booking: Booking
  reviewer: User
  worker: WorkerProfile
  rating: Int!
  ratingPunctuality: Int
  ratingQuality: Int
  ratingCommunication: Int
  ratingValue: Int
  comment: String
  reviewType: String!
  status: String!
  photos: [ReviewPhoto!]!
  createdAt: DateTime!
}

type ReviewPhoto {
  id: ID!
  photoUrl: String!
  sortOrder: Int!
}

type ReviewConnection {
  reviews: [Review!]!
  totalCount: Int!
}

extend type Query {
  companyWorkerReviews(limit: Int, offset: Int, rating: Int): ReviewConnection!
}

extend type Mutation {
  submitReview(input: SubmitReviewInput!): Review!
  uploadReviewPhotos(reviewId: ID!, files: [Upload!]!): [ReviewPhoto!]!
}

input SubmitReviewInput {
  bookingId: ID!
  rating: Int!
  ratingPunctuality: Int
  ratingQuality: Int
  ratingCommunication: Int
  ratingValue: Int
  comment: String
}
