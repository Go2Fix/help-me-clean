type EnabledCity {
  id: ID!
  name: String!
  county: String!
  isActive: Boolean!
  pricingMultiplier: Float!
  areas: [CityArea!]!
}

type CityArea {
  id: ID!
  name: String!
  cityId: ID!
  cityName: String!
}

type WorkerSuggestion {
  worker: WorkerProfile!
  company: Company!
  availabilityStatus: String!
  availableFrom: String
  availableTo: String
  suggestedStartTime: String
  suggestedEndTime: String
  suggestedSlotIndex: Int
  suggestedDate: String
  matchScore: Float!
}

extend type Query {
  # Public
  activeCities: [EnabledCity!]!
  cityAreas(cityId: ID!): [CityArea!]!

  # Admin
  allCities: [EnabledCity!]!

  # Company admin
  myCompanyServiceAreas: [CityArea!]!

  # Company admin (per-worker read)
  workerServiceAreas(workerId: ID!): [CityArea!]!

  # Worker (read-only)
  myWorkerServiceAreas: [CityArea!]!

  # Match-making (client booking flow)
  suggestWorkers(
    cityId: ID!
    areaId: ID!
    timeSlots: [TimeSlotInput!]!
    estimatedDurationHours: Float!
  ): [WorkerSuggestion!]!

  # Validate city is supported
  isCitySupported(city: String!): Boolean!
}

extend type Mutation {
  # Admin
  createCity(name: String!, county: String!): EnabledCity!
  toggleCityActive(id: ID!, isActive: Boolean!): EnabledCity!
  updateCityPricingMultiplier(id: ID!, pricingMultiplier: Float!): EnabledCity!
  createCityArea(cityId: ID!, name: String!): CityArea!
  deleteCityArea(id: ID!): Boolean!

  # Company admin
  updateCompanyServiceAreas(areaIds: [ID!]!): [CityArea!]!

  # Company admin (per-worker)
  updateWorkerServiceAreas(workerId: ID!, areaIds: [ID!]!): [CityArea!]!
}
