enum PricingModel {
  HOURLY
  PER_SQM
}

type ServiceCategory {
  id: ID!
  slug: String!
  nameRo: String!
  nameEn: String!
  descriptionRo: String
  descriptionEn: String
  icon: String
  imageUrl: String
  commissionPct: Float
  sortOrder: Int!
  isActive: Boolean!
  services: [ServiceDefinition!]!
  formFields: String
}

type ServiceDefinition {
  id: ID!
  serviceType: ServiceType!
  nameRo: String!
  nameEn: String!
  descriptionRo: String
  descriptionEn: String
  basePricePerHour: Float!
  minHours: Float!
  hoursPerRoom: Float!
  hoursPerBathroom: Float!
  hoursPer100Sqm: Float!
  houseMultiplier: Float!
  petDurationMinutes: Int!
  icon: String
  isActive: Boolean!
  includedItems: [String!]!
  categoryId: ID
  pricingModel: PricingModel!
  pricePerSqm: Float
}

type ServiceExtra {
  id: ID!
  nameRo: String!
  nameEn: String!
  price: Float!
  durationMinutes: Int!
  icon: String
  isActive: Boolean!
  allowMultiple: Boolean!
  unitLabel: String
  categoryId: ID
}

type PriceEstimate {
  hourlyRate: Float!
  estimatedHours: Float!
  propertyMultiplier: Float!
  cityPricingMultiplier: Float!
  petsSurcharge: Float!
  subtotal: Float!
  extras: [ExtraLineItem!]!
  total: Float!
  pricingModel: PricingModel!
  areaTotal: Float
}

type ExtraLineItem {
  extra: ServiceExtra!
  quantity: Int!
  lineTotal: Float!
}

extend type Query {
  availableServices: [ServiceDefinition!]!
  availableExtras: [ServiceExtra!]!
  availableExtrasByCategory(categoryId: ID!): [ServiceExtra!]!
  estimatePrice(input: PriceEstimateInput!): PriceEstimate!
  serviceCategories: [ServiceCategory!]!
  serviceCategoryBySlug(slug: String!): ServiceCategory
  allServiceCategories: [ServiceCategory!]!
}

input PriceEstimateInput {
  serviceType: ServiceType!
  numRooms: Int!
  numBathrooms: Int!
  areaSqm: Int
  propertyType: String
  hasPets: Boolean
  extras: [ExtraInput!]
  city: String
}

extend type Query {
  allServices: [ServiceDefinition!]!
  allExtras: [ServiceExtra!]!
}

extend type Mutation {
  updateServiceDefinition(input: UpdateServiceDefinitionInput!): ServiceDefinition!
  createServiceDefinition(input: CreateServiceDefinitionInput!): ServiceDefinition!
  updateServiceExtra(input: UpdateServiceExtraInput!): ServiceExtra!
  createServiceExtra(input: CreateServiceExtraInput!): ServiceExtra!
  createServiceCategory(input: CreateServiceCategoryInput!): ServiceCategory!
  updateServiceCategory(input: UpdateServiceCategoryInput!): ServiceCategory!
}

input UpdateServiceDefinitionInput {
  id: ID!
  nameRo: String!
  nameEn: String!
  basePricePerHour: Float!
  minHours: Float!
  hoursPerRoom: Float!
  hoursPerBathroom: Float!
  hoursPer100Sqm: Float!
  houseMultiplier: Float!
  petDurationMinutes: Int!
  isActive: Boolean!
  includedItems: [String!]
  categoryId: ID
  pricingModel: PricingModel!
  pricePerSqm: Float
}

input CreateServiceDefinitionInput {
  serviceType: ServiceType!
  nameRo: String!
  nameEn: String!
  basePricePerHour: Float!
  minHours: Float!
  hoursPerRoom: Float!
  hoursPerBathroom: Float!
  hoursPer100Sqm: Float!
  houseMultiplier: Float!
  petDurationMinutes: Int!
  isActive: Boolean!
  includedItems: [String!]
  categoryId: ID
  pricingModel: PricingModel!
  pricePerSqm: Float
}

input UpdateServiceExtraInput {
  id: ID!
  nameRo: String!
  nameEn: String!
  price: Float!
  durationMinutes: Int!
  isActive: Boolean!
  allowMultiple: Boolean!
  unitLabel: String
  categoryId: ID
}

input CreateServiceExtraInput {
  nameRo: String!
  nameEn: String!
  price: Float!
  durationMinutes: Int!
  isActive: Boolean!
  allowMultiple: Boolean!
  unitLabel: String
  categoryId: ID
}

input CreateServiceCategoryInput {
  slug: String!
  nameRo: String!
  nameEn: String!
  descriptionRo: String
  descriptionEn: String
  icon: String
  imageUrl: String
  commissionPct: Float
  sortOrder: Int!
  isActive: Boolean!
  formFields: String
}

input UpdateServiceCategoryInput {
  id: ID!
  nameRo: String!
  nameEn: String!
  descriptionRo: String
  descriptionEn: String
  icon: String
  imageUrl: String
  commissionPct: Float
  sortOrder: Int!
  isActive: Boolean!
  formFields: String
}
