enum BookingStatus {
  ASSIGNED
  CONFIRMED
  IN_PROGRESS
  COMPLETED
  CANCELLED_BY_CLIENT
  CANCELLED_BY_COMPANY
  CANCELLED_BY_ADMIN
}

enum ServiceType {
  STANDARD_CLEANING
  DEEP_CLEANING
  MOVE_IN_OUT_CLEANING
  POST_CONSTRUCTION
  OFFICE_CLEANING
  WINDOW_CLEANING
}

type Booking {
  id: ID!
  referenceCode: String!
  client: User
  company: Company
  worker: WorkerProfile
  address: Address
  serviceType: ServiceType!
  serviceName: String!
  includedItems: [String!]!
  scheduledDate: String!
  scheduledStartTime: String!
  estimatedDurationHours: Float!
  propertyType: String
  numRooms: Int
  numBathrooms: Int
  areaSqm: Int
  hasPets: Boolean
  specialInstructions: String
  hourlyRate: Float!
  estimatedTotal: Float!
  finalTotal: Float
  platformCommissionPct: Float!
  extras: [BookingExtra!]!
  status: BookingStatus!
  startedAt: DateTime
  completedAt: DateTime
  cancelledAt: DateTime
  cancellationReason: String
  paymentStatus: String!
  paidAt: DateTime
  recurringGroupId: ID
  subscriptionId: ID
  occurrenceNumber: Int
  rescheduleCount: Int!
  rescheduledAt: DateTime
  timeSlots: [BookingTimeSlot!]!
  review: Review
  chatRoom: ChatRoom
  categoryId: ID
  category: ServiceCategory
  createdAt: DateTime!
}

type BookingExtra {
  extra: ServiceExtra!
  price: Float!
  quantity: Int!
}

type BookingTimeSlot {
  id: ID!
  slotDate: String!
  startTime: String!
  endTime: String!
  isSelected: Boolean!
}

input TimeSlotInput {
  date: String!
  startTime: String!
  endTime: String!
}

type BookingConnection {
  edges: [Booking!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type BookingPolicy {
  cancelFreeHoursBefore: Int!
  cancelLateRefundPct: Int!
  rescheduleFreeHoursBefore: Int!
  rescheduleMaxPerBooking: Int!
}

type WorkerAvailabilityCheck {
  available: Boolean!
  reason: String
  conflicts: [String!]!
}

extend type Query {
  myBookings(status: BookingStatus, first: Int, after: String): BookingConnection!
  booking(id: ID!): Booking!
  companyBookings(status: BookingStatus, first: Int, after: String): BookingConnection!
  myAssignedJobs(status: BookingStatus): [Booking!]!
  todaysJobs: [Booking!]!
  allBookings(status: BookingStatus, companyId: ID, dateFrom: String, dateTo: String, first: Int, after: String): BookingConnection!
  companyBookingsByDateRange(from: String!, to: String!): [Booking!]!
  searchCompanyBookings(query: String, status: String, dateFrom: String, dateTo: String, limit: Int, offset: Int): BookingConnection!
  bookingPolicy: BookingPolicy!
  checkWorkerAvailability(bookingId: ID!, date: String!, startTime: String!): WorkerAvailabilityCheck!
}

extend type Mutation {
  createBookingRequest(input: CreateBookingInput!): Booking!
  cancelBooking(id: ID!, reason: String): Booking!
  assignWorkerToBooking(bookingId: ID!, workerId: ID!): Booking!
  confirmBooking(id: ID!): Booking!
  startJob(id: ID!): Booking!
  completeJob(id: ID!): Booking!
  selectBookingTimeSlot(bookingId: ID!, timeSlotId: ID!): Booking!
  rescheduleBooking(id: ID!, scheduledDate: String!, scheduledStartTime: String!, reason: String): Booking!
}

input CreateBookingInput {
  addressId: ID
  address: AddAddressInput
  serviceType: ServiceType!
  categoryId: ID
  scheduledDate: String
  scheduledStartTime: String
  timeSlots: [TimeSlotInput!]
  propertyType: String
  numRooms: Int!
  numBathrooms: Int!
  areaSqm: Int
  hasPets: Boolean
  specialInstructions: String
  extras: [ExtraInput!]
  guestEmail: String
  guestName: String
  guestPhone: String
  preferredWorkerId: ID
  suggestedStartTime: String
  recurrence: RecurrenceInput
}

input ExtraInput {
  extraId: ID!
  quantity: Int!
}
